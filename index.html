/* IMAGEM */
.banner img{

bottom:0;
left:0;
width:100%;
background:#0b1320;
padding:12px;
box-shadow:0 -6px 20px rgba(0,0,0,.5);
}

.sticky a{
display:block;
background:#00ff88;
color:#000;
font-size:22px;
font-weight:900;
padding:18px;
